# ESPHome Rojaflex Shutter Control
#
# Uses the upstream ESPHome cc1101 component. The rojaflex Hub + Cover are
# delivered as an external_component from the components/ subdirectory.
#
# SETUP:
# 1. Adjust wifi / ota secrets in secrets.yaml
# 2. Adjust channel list (2..N) and names below
# 3. esphome compile esphome-rojaflex-native.yaml &&
#    esphome upload  esphome-rojaflex-native.yaml --device rojaflex-shutter.local

substitutions:
  device_name: "rojaflex-shutter"
  friendly_name: "Rojaflex Shutter Controller"

external_components:
  - source:
      type: local
      path: components
    components: [rojaflex]

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # Workaround for ESP-IDF 5.5.4 interrupt watchdog panics during
      # USB-Serial-JTAG ISR install and SPI peripheral claim/free.
      CONFIG_ESP_INT_WDT_TIMEOUT_MS: "5000"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: INFO

ota:
  - platform: esphome
    password: !secret ota_password

api:
  reboot_timeout: 10min
  services:
    # Set shared housecode (7 hex chars, e.g. "7A1B2C3").
    # Use "0000000" to re-enable AutoLearn.
    - service: set_housecode
      variables:
        new_housecode: string
      then:
        - lambda: |-
            id(rojaflex_hub).apply_manual_housecode(std::string(new_housecode));

    - service: get_housecode
      then:
        - lambda: |-
            ESP_LOGI("rojaflex", "Shared housecode: %s",
                     id(rojaflex_hub).get_housecode().c_str());

    # Test send: esphome.rojaflex_shutter_test_send with channel_id + command
    # command codes: 0=STOP, 1=UP, 8=DOWN
    - service: test_send
      variables:
        channel_id: int
        command: int
      then:
        - lambda: |-
            id(rojaflex_hub).send_command(
                static_cast<uint32_t>(channel_id),
                static_cast<uint8_t>(command));

# LilyGO T-Embed CC1101 SPI pins (shared bus for TFT, SD, CC1101).
spi:
  clk_pin: GPIO11
  mosi_pin: GPIO9
  miso_pin: GPIO10

# Power-enable, antenna switch and bus-CS isolation: declared as switches
# with restore_mode ALWAYS_ON so ESPHome drives them HIGH BEFORE the cc1101
# component initializes (avoids the pin-muxing race from Phase 0).
#
# The T-Embed CC1101 shares its SPI bus with SD card, display and nRF24.
# If their CS pins float LOW during boot they contend MISO and the CC1101
# SPI verification fails → "cc1101 is marked FAILED". Driving all CS pins
# HIGH before CC1101 setup prevents this (verified in debug sessions).
#
# setup_priority: HARDWARE (200) runs BEFORE the cc1101 component (DATA=100),
# matching the debug firmware's init order: pins HIGH first, then SPI/CC1101.
switch:
  - platform: gpio
    id: pwr_en
    pin: GPIO15
    restore_mode: ALWAYS_ON
    internal: true
    setup_priority: 200

  - platform: gpio
    id: antenna_sw0
    pin: GPIO48
    restore_mode: ALWAYS_ON
    internal: true
    setup_priority: 200

  - platform: gpio
    id: antenna_sw1
    pin: GPIO47
    restore_mode: ALWAYS_ON
    internal: true
    setup_priority: 200

  # SPI bus isolation — keep these HIGH so they don't pull MISO low.
  - platform: gpio
    id: sd_cs
    pin: GPIO13
    restore_mode: ALWAYS_ON
    internal: true
    setup_priority: 200

  - platform: gpio
    id: display_cs
    pin: GPIO41
    restore_mode: ALWAYS_ON
    internal: true
    setup_priority: 200

  - platform: gpio
    id: nrf24_cs
    pin: GPIO44
    restore_mode: ALWAYS_ON
    internal: true
    setup_priority: 200

# Native upstream cc1101 component — verified working on T-Embed CC1101 in Phase 0.
cc1101:
  id: cc1101_radio
  cs_pin: GPIO12
  gdo0_pin: GPIO3
  frequency: 433.92MHz
  modulation_type: GFSK
  symbol_rate: 9993
  fsk_deviation: 20.63kHz
  filter_bandwidth: 58kHz
  sync_mode: "30/32"
  sync0: 0x91
  sync1: 0xD3
  num_preamble: 4
  packet_mode: true
  packet_length: 9
  crc_enable: true
  output_power: 5

# Rojaflex Hub — wires the cc1101 to the P109 protocol logic.
rojaflex:
  id: rojaflex_hub
  cc1101_id: cc1101_radio
  housecode: "0000000"   # "0000000" = AutoLearn active; set via HA service after first learn
  tx_repetitions: 2

# ── Hub-level sensors ────────────────────────────────────────────────────────

text_sensor:
  # Doubles as status display: shows "Receiving...", "Learning: 0xXXX (n/N)",
  # or the configured housecode as "0xXXXXXXX" once locked in. Diagnostic
  # category — the value is operationally static once auto-learn settles.
  - platform: rojaflex
    rojaflex_id: rojaflex_hub
    type: housecode
    name: "Housecode"
    id: housecode_display
    entity_category: diagnostic

  - platform: rojaflex
    rojaflex_id: rojaflex_hub
    type: last_rx_info
    name: "Rojaflex Last RX Info"
    id: last_rx_info
    entity_category: diagnostic

  # "ok" when the most recent send_command got at least one acknowledged TX
  # from the CC1101 driver, otherwise the short CC1101Error name:
  # "timeout" / "params" / "pll-lock". Diagnostic + default-disabled — only
  # interesting when chasing TX failures.
  - platform: rojaflex
    rojaflex_id: rojaflex_hub
    type: last_tx
    name: "CC1101 Last TX"
    id: cc1101_last_tx
    entity_category: diagnostic
    disabled_by_default: true

  # Stock ESPHome WiFi info — SSID of the currently associated AP. Diagnostic
  # category so it lands under HA's "Diagnose" section, not the main tile grid.
  - platform: wifi_info
    ssid:
      name: "WiFi SSID"
      entity_category: diagnostic

# Stock ESPHome WiFi signal sensor. Updated every 60 s to keep history
# meaningful without hammering the recorder.
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

# ── Per-channel covers (channels 2..9) ──────────────────────────────────────

cover:
  - platform: rojaflex
    rojaflex_id: rojaflex_hub
    name: "Rolladen 2"
    id: rolladen2
    channel: 2
    icon: mdi:window-shutter
    device_class: shutter
    status_sensor:
